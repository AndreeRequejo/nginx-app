server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Logs hacia stdout/stderr para que Dokploy los capture
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Assets compilados por Vite — cache agresivo
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Archivos estáticos
    location ~* \.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Todas las rutas pasan por index.php (Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM — apunta al contenedor app por nombre de servicio
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
        fastcgi_connect_timeout      60s;
        fastcgi_send_timeout         120s;
        fastcgi_read_timeout         120s;
    }

    # Bloquear acceso a archivos ocultos
    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 50M;
}