# ── Servicio: Nginx ─────────────────────────────────────────
services:

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    image: peruanoamericano-nginx
    container_name: peruanoamericano-nginx
    restart: unless-stopped

    ports:
      - "${APP_PORT:-80}:80"

    volumes:
      # Assets estáticos (public/build) generados en la imagen app
      - app-public:/var/www/html/public:ro

    networks:
      - peruanoamericano

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3


networks:
  peruanoamericano:
    external: true   # misma red que usa el servicio app


volumes:
  app-public:
    external: true   # volumen creado por el servicio app